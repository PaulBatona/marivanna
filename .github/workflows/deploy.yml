# Упрощенная сборка для статических сайтов на GitHub Pages

name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Или master, если у вас так называется главная ветка
  workflow_dispatch:

# Настройка разрешений токена GITHUB_TOKEN для разворачивания (deployment) в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Папка, куда билдится проект (у Vite это обычно dist)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
